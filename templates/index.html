<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ÇınarGPT</title>
    <style>
        body { 
            font-family: Arial; 
            background: #222; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 50px; 
        }
        #chatbox { 
            width: 500px; 
            height: 400px; 
            border: 1px solid #555; 
            padding: 10px; 
            overflow-y: scroll; 
            margin-bottom: 10px; 
            background: #111; 
        }
        #message { 
            width: 500px; 
            padding: 5px; 
            font-size: 16px;
            border: 1px solid #555;
            background: #222;
            color: #fff;
        }
        .user { color: #0f0; margin: 5px 0; }
        .bot { color: #0af; margin: 5px 0; }
    </style>
</head>
<body>
    <h1>ÇınarGPT</h1>
    <div id="chatbox"></div>
    <input type="text" id="message" placeholder="Mesaj yaz..." onkeydown="if(event.key==='Enter'){sendMessage()}">

    <script src="/static/script.js"></script>
</body>
</html>
